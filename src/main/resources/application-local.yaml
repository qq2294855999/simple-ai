  annex:
    # 附件上传配置
    server-url: http://minio.dev.joyswon.com
    access-key: admin
    access-secret: rXd5BErpRk
  event:
    type: mq # 事件实现方式
    concurrency: 1 # 事件消费并发数
  auth:
    hs-key: sInFHs4zRGIfrVTWVDdGJuKZRc0DfVBF # JWT密钥
    project-code: simple-ai # 项目编码

